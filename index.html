<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TransitCore — Ticket Desk</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- EmailJS Library -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
  :root{
    --emerald-deep:#0B3D2E;
    --emerald-black:#0A1B15;
    --emerald-mid:#123D2F;
    --brass:#C9A34E;
    --brass-light:#E7CB84;
    --ivory:#F6F1E2;
    --ivory-dim:#EDE6D2;
    --sage:#8AA894;
    --rust:#B5482A;
    --ink:#132018;
    --line: rgba(201,163,78,0.35);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--emerald-black);color:var(--ivory);font-family:'Inter',sans-serif;}
  .app{min-height:100vh;display:flex;flex-direction:column;}

  /* header */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;border-bottom:1px solid var(--line);background:linear-gradient(180deg, var(--emerald-deep), var(--emerald-black));}
  .brand{display:flex;align-items:baseline;gap:10px;}
  .brand .wordmark{font-family:'Fraunces',serif;font-weight:700;font-size:22px;letter-spacing:0.3px;color:var(--ivory);}
  .brand .tagline{font-size:11px;color:var(--sage);text-transform:uppercase;letter-spacing:1.5px;}
  .desk-label{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--brass-light);border:1px solid var(--line);padding:5px 10px;border-radius:20px;}

  /* gate */
  .gate{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;}
  .gate-card{background:var(--emerald-mid);border:1px solid var(--line);border-radius:14px;padding:36px;max-width:380px;width:100%;text-align:center;}
  .gate-card h2{font-family:'Fraunces',serif;font-size:20px;margin:0 0 6px;color:var(--brass-light);}
  .gate-card p{font-size:13px;color:var(--sage);margin:0 0 18px;}
  .gate-card input{width:100%;padding:12px 14px;border-radius:8px;border:1px solid var(--line);background:var(--emerald-black);color:var(--ivory);font-family:'IBM Plex Mono',monospace;font-size:15px;text-align:center;letter-spacing:3px;}
  .gate-card button{margin-top:14px;width:100%;padding:12px;border-radius:8px;border:none;background:var(--brass);color:var(--emerald-black);font-weight:700;font-size:14px;cursor:pointer;}
  .gate-error{color:var(--rust);font-size:12px;margin-top:10px;min-height:14px;}

  /* main layout */
  .main{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:0;}
  @media (max-width:920px){.main{grid-template-columns:1fr;}}
  .panel{padding:26px 30px;overflow-y:auto;}
  .panel-left{border-right:1px solid var(--line);}
  .section-title{font-family:'Fraunces',serif;font-size:16px;color:var(--brass-light);margin:0 0 14px;display:flex;align-items:center;gap:8px;}
  .section-title .num{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--sage);border:1px solid var(--line);border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;}

  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--sage);margin-bottom:6px;}
  .field label .required{color:var(--rust);margin-left:4px;}
  .field input, .field select{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--line);background:var(--emerald-mid);color:var(--ivory);font-family:'Inter',sans-serif;font-size:14px;}
  .field input::placeholder{color:#6f8478;}
  .field input:focus, .field select:focus{outline:none;border-color:var(--brass);}

  .generate-btn{width:100%;padding:14px;margin-top:20px;border:none;border-radius:10px;background:var(--brass);color:var(--emerald-black);font-weight:700;font-size:15px;cursor:pointer;font-family:'Inter',sans-serif;}
  .generate-btn:disabled{background:#4a564d;color:#8aa894;cursor:not-allowed;}
  .form-error{color:var(--rust);font-size:12px;margin-top:8px;min-height:14px;}

  /* right panel: ticket preview */
  .panel-right{display:flex;flex-direction:column;}
  .ticket-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:10px;}
  .empty-state{color:var(--sage);text-align:center;padding:60px 20px;font-size:13px;line-height:1.6;}
  .empty-state .big{font-family:'Fraunces',serif;font-size:18px;color:var(--brass-light);display:block;margin-bottom:8px;}

  .ticket{width:100%;max-width:420px;background:var(--ivory);color:var(--ink);border-radius:16px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,0.4);position:relative;}
  .ticket-top{padding:22px 24px 18px;position:relative;background:linear-gradient(135deg, var(--emerald-deep), var(--emerald-mid));color:var(--ivory);}
  .ticket-top .tt-brand{font-family:'Fraunces',serif;font-weight:700;font-size:17px;color:var(--brass-light);}
  .ticket-top .tt-sub{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--sage);margin-top:2px;}
  .ticket-route{padding:20px 24px 10px;}
  .route-line{display:flex;align-items:center;justify-content:space-between;}
  .route-city{font-family:'Fraunces',serif;font-size:22px;font-weight:600;line-height:1.1;}
  .route-city .sub{display:block;font-family:'Inter',sans-serif;font-size:10px;color:#5c6b60;text-transform:uppercase;letter-spacing:1px;margin-top:3px;font-weight:500;}
  .route-arrow{font-family:'IBM Plex Mono',monospace;color:var(--brass);font-size:18px;padding:0 10px;}

  .perforation{position:relative;height:0;border-top:2px dashed #C9C2A6;margin:18px 0 0;}
  .perforation::before,.perforation::after{content:'';position:absolute;top:-11px;width:22px;height:22px;border-radius:50%;background:var(--emerald-black);}
  .perforation::before{left:-11px;}
  .perforation::after{right:-11px;}

  .ticket-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 20px;padding:18px 24px;}
  .tg-item .tg-label{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#8a9188;margin-bottom:3px;}
  .tg-item .tg-value{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;}
  .ticket-code-block{padding:14px 24px 22px;display:flex;align-items:center;justify-content:space-between;gap:14px;}
  .code-text{font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:600;letter-spacing:2px;color:var(--emerald-deep);}
  .code-text .label{display:block;font-family:'Inter',sans-serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#8a9188;font-weight:500;margin-bottom:3px;}
  .qr-box img{display:block;width:64px;height:64px;border-radius:6px;border:1px solid #d9d2ba;}

  .ticket-actions{display:flex;gap:10px;margin-top:18px;width:100%;max-width:420px;flex-wrap:wrap;}
  .action-btn{flex:1;min-width:120px;padding:11px;border-radius:9px;border:1px solid var(--line);background:var(--emerald-mid);color:var(--ivory);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
  .action-btn.whatsapp{background:#25D366;color:#0a1b15;border-color:#25D366;}
  .action-btn.email{background:#EA4335;color:#fff;border-color:#EA4335;}
  .action-btn.download{background:var(--brass);color:var(--emerald-black);border-color:var(--brass);}
  .action-btn:hover{filter:brightness(1.08);}
  .action-btn:disabled{opacity:0.6;cursor:not-allowed;filter:none;}

  /* history */
  .history{margin-top:26px;width:100%;max-width:420px;}
  .history-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .history-head h3{font-family:'Fraunces',serif;font-size:14px;color:var(--brass-light);margin:0;}
  .history-search{padding:6px 10px;border-radius:6px;border:1px solid var(--line);background:var(--emerald-mid);color:var(--ivory);font-size:12px;font-family:'IBM Plex Mono',monospace;width:140px;}
  .history-list{max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;}
  .history-row{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border:1px solid var(--line);border-radius:8px;font-size:12px;background:var(--emerald-mid);cursor:pointer;}
  .history-row:hover{border-color:var(--brass);}
  .history-row .hr-code{font-family:'IBM Plex Mono',monospace;color:var(--brass-light);}
  .history-row .hr-name{color:var(--ivory);}
  .history-row .hr-route{color:var(--sage);font-size:11px;}
  .history-empty{color:var(--sage);font-size:12px;text-align:center;padding:14px;}

  /* Toast notification */
  .toast{position:fixed;bottom:30px;right:30px;background:var(--emerald-mid);color:var(--ivory);padding:16px 24px;border-radius:12px;border:1px solid var(--brass);box-shadow:0 10px 40px rgba(0,0,0,0.5);font-size:14px;z-index:999;transform:translateY(100px);opacity:0;transition:all 0.4s ease;max-width:400px;}
  .toast.show{transform:translateY(0);opacity:1;}
  .toast.success{border-color:#4CAF50;}
  .toast.error{border-color:var(--rust);}

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--emerald-mid);border-radius:8px;}

  @media print{
    body *{visibility:hidden;}
    .ticket, .ticket *{visibility:visible;}
    .ticket{position:absolute;top:0;left:0;box-shadow:none;}
  }
</style>
</head>
<body>

<script>
// ===== EMAILJS CONFIGURATION =====
const EMAILJS_CONFIG = {
    PUBLIC_KEY: 'tq9cIXbI9_-zFCYaH',
    SERVICE_ID: 'service_twtzeca',
    TEMPLATE_ID: 'template_fvjhkoj'
};

// Initialize EmailJS
(function() {
    try {
        emailjs.init(EMAILJS_CONFIG.PUBLIC_KEY);
        console.log('✅ EmailJS initialized successfully!');
    } catch(e) {
        console.warn('⚠️ EmailJS not initialized. Email sending will not work.');
    }
})();

// ===== END EMAILJS CONFIG =====

const PASSCODE = "John+2558";

let bookings = [];
let currentTicket = null;

// ===== CLOCK FUNCTION =====
function updateClock(){
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-GB', {
    day: '2-digit',
    month: 'short',
    year: 'numeric'
  });
  const timeStr = now.toLocaleTimeString('en-GB', {
    hour: '2-digit',
    minute: '2-digit'
  });
  document.getElementById('deskClock').textContent = dateStr + ' · ' + timeStr;
}

updateClock();
setInterval(updateClock, 30000);

function tryUnlock(){
  const val = document.getElementById('gateInput').value;
  if(val === PASSCODE){
    document.getElementById('gateScreen').style.display='none';
    document.getElementById('mainScreen').style.display='grid';
    init();
  } else {
    document.getElementById('gateError').textContent = 'Wrong passcode. Try again.';
  }
}
document.getElementById('gateInput').addEventListener('keydown', e=>{ if(e.key==='Enter') tryUnlock(); });

async function init(){
  updateClock();
  document.getElementById('travelDate').valueAsDate = new Date();
  await loadBookings();
  renderHistory();
}

async function loadBookings(){
  try{
    const res = await window.storage.get('bookings-all', true);
    bookings = res && res.value ? JSON.parse(res.value) : [];
  }catch(e){
    bookings = [];
  }
}

async function saveBookings(){
  try{
    await window.storage.set('bookings-all', JSON.stringify(bookings), true);
  }catch(e){
    console.error('Could not save booking', e);
  }
}

// ===== NEW: Generate ticket code using Reg No =====
function genCode(regNo){
  // Clean the registration number: remove spaces and special characters, convert to uppercase
  const cleanReg = regNo.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
  
  // If reg no is empty, fallback to random code
  if(!cleanReg){
    const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let rand='';
    for(let i=0;i<6;i++) rand += chars[Math.floor(Math.random()*chars.length)];
    return `TRC-${rand}`;
  }
  
  // Generate random 4-character suffix for uniqueness
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let suffix = '';
  for(let i=0;i<4;i++) suffix += chars[Math.floor(Math.random()*chars.length)];
  
  // Format: TRC-REGNO-SUFFIX (e.g., TRC-2500523-A7K9)
  return `TRC-${cleanReg}-${suffix}`;
}

function formatDate(dstr){
  if(!dstr) return '—';
  const d = new Date(dstr+'T00:00:00');
  return d.toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});
}

function showToast(message, type = 'success'){
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = 'toast ' + type;
  void toast.offsetWidth;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => {
    toast.classList.remove('show');
  }, 4000);
}

// ===== GENERATE TICKET PNG AS DATA URL =====
function generateTicketPNG(t) {
    return new Promise((resolve) => {
        const canvas = document.createElement('canvas');
        const W = 600, H = 880;
        canvas.width = W;
        canvas.height = H;
        const ctx = canvas.getContext('2d');
        
        // Background
        ctx.fillStyle = '#F6F1E2';
        ctx.fillRect(0, 0, W, H);
        
        // Top band
        const grad = ctx.createLinearGradient(0, 0, W, 180);
        grad.addColorStop(0, '#0B3D2E');
        grad.addColorStop(1, '#123D2F');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, 130);
        
        ctx.fillStyle = '#E7CB84';
        ctx.font = "700 28px Georgia, serif";
        ctx.fillText('TransitCore', 30, 60);
        
        ctx.fillStyle = '#8AA894';
        ctx.font = "10px Arial";
        ctx.fillText(('STUDENT TRANSIT, SORTED · ' + t.operator).toUpperCase(), 30, 85);
        
        // Route
        ctx.fillStyle = '#132018';
        ctx.font = "600 32px Georgia, serif";
        ctx.fillText(t.origin, 30, 170);
        
        ctx.fillStyle = '#C9A34E';
        ctx.font = "22px Arial";
        const oW = ctx.measureText(t.origin).width;
        ctx.fillText('→', 30 + oW + 15, 166);
        
        ctx.fillStyle = '#132018';
        ctx.font = "600 32px Georgia, serif";
        ctx.fillText(t.destination, 30 + oW + 55, 170);
        
        // Dashed line
        ctx.strokeStyle = '#C9C2A6';
        ctx.setLineDash([6, 4]);
        ctx.beginPath();
        ctx.moveTo(25, 210);
        ctx.lineTo(W - 25, 210);
        ctx.stroke();
        ctx.setLineDash([]);
        
        // Grid details
        const rows = [
            ['PASSENGER', t.custName, 'REG NO', t.custRegNo],
            ['DATE', formatDate(t.travelDate), 'DEPARTURE', t.travelTime],
            ['FARE PAID', '₦' + Number(t.fare).toLocaleString(), 'PHONE', t.custPhone],
            ['EMAIL', t.custEmail, '', '']
        ];
        
        let y = 250;
        rows.forEach(r => {
            ctx.fillStyle = '#8a9188';
            ctx.font = "9px Arial";
            ctx.fillText(r[0], 30, y);
            if (r[2]) ctx.fillText(r[2], 310, y);
            
            ctx.fillStyle = '#132018';
            ctx.font = "600 16px 'Courier New', monospace";
            ctx.fillText(r[1], 30, y + 22);
            if (r[3]) ctx.fillText(r[3], 310, y + 22);
            
            y += 55;
        });
        
        // Dashed line
        ctx.strokeStyle = '#C9C2A6';
        ctx.setLineDash([6, 4]);
        ctx.beginPath();
        ctx.moveTo(25, y + 10);
        ctx.lineTo(W - 25, y + 10);
        ctx.stroke();
        ctx.setLineDash([]);
        
        y += 40;
        
        // Ticket code
        ctx.fillStyle = '#8a9188';
        ctx.font = "9px Arial";
        ctx.fillText('TICKET CODE', 30, y);
        ctx.fillStyle = '#0B3D2E';
        ctx.font = "700 20px 'Courier New', monospace";
        ctx.fillText(t.code, 30, y + 28);
        
        // IMPORTANT INSTRUCTIONS
        const instY = y + 70;
        
        // Border box for important instructions
        ctx.strokeStyle = '#C9A34E';
        ctx.lineWidth = 2;
        ctx.strokeRect(25, instY - 10, W - 50, 75);
        ctx.lineWidth = 1;
        
        ctx.fillStyle = '#B5482A';
        ctx.font = "bold 11px Arial";
        ctx.fillText('⚠️ IMPORTANT TRAVEL REQUIREMENTS', 30, instY + 8);
        
        ctx.fillStyle = '#132018';
        ctx.font = "10px Arial";
        ctx.fillText('• Arrive at the terminal 30 minutes before departure', 30, instY + 28);
        ctx.fillText('• Show this ticket on your device OR print it out', 30, instY + 44);
        ctx.fillText('• Valid ID card is MANDATORY for entry', 30, instY + 60);
        
        // Footer
        const footerY = instY + 95;
        ctx.fillStyle = '#8a9188';
        ctx.font = "9px Arial";
        ctx.fillText('Issued via TransitCore Ticket Desk · Student Transit, Sorted', 30, footerY);
        
        // QR Code
        const qrImg = new Image();
        qrImg.crossOrigin = 'anonymous';
        const qrData = encodeURIComponent(`TransitCore|${t.code}|${t.origin}-${t.destination}|${t.travelDate} ${t.travelTime}|${t.custName}|${t.custRegNo}`);
        qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=120x120&margin=0&data=${qrData}`;
        
        qrImg.onload = function() {
            ctx.drawImage(qrImg, W - 150, 155, 120, 120);
            resolve(canvas.toDataURL('image/png'));
        };
        
        qrImg.onerror = function() {
            resolve(canvas.toDataURL('image/png'));
        };
    });
}

// ===== SEND AUTO-REPLY EMAIL VIA EMAILJS =====
async function sendAutoReplyEmail(ticket) {
    try {
        const templateParams = {
            to_name: ticket.custName,
            email: ticket.custEmail,
            ticket_code: ticket.code,
            origin: ticket.origin,
            destination: ticket.destination,
            travel_date: formatDate(ticket.travelDate),
            travel_time: ticket.travelTime,
            operator: ticket.operator,
            fare: '₦' + Number(ticket.fare).toLocaleString(),
            reg_no: ticket.custRegNo,
            phone: ticket.custPhone,
            passenger_name: ticket.custName
        };

        const response = await emailjs.send(
            EMAILJS_CONFIG.SERVICE_ID,
            EMAILJS_CONFIG.TEMPLATE_ID,
            templateParams
        );

        console.log('✅ Auto-reply email sent!', response.status);
        showToast('✉️ Ticket confirmation email sent to ' + ticket.custEmail + '!', 'success');
        return true;
    } catch(error) {
        console.error('❌ Failed to send email:', error);
        showToast('⚠️ Could not send email. Please check EmailJS configuration.', 'error');
        return false;
    }
}

async function generateTicket(){
  const origin = document.getElementById('origin').value.trim();
  const destination = document.getElementById('destination').value.trim();
  const travelDate = document.getElementById('travelDate').value;
  const travelTime = document.getElementById('travelTime').value;
  const operator = document.getElementById('operator').value.trim() || 'GIGM';
  const fare = document.getElementById('fare').value;
  const custName = document.getElementById('custName').value.trim();
  const custPhone = document.getElementById('custPhone').value.trim();
  const custEmail = document.getElementById('custEmail').value.trim();
  const custRegNo = document.getElementById('custRegNo').value.trim();
  const errEl = document.getElementById('formError');

  if(!origin||!destination||!travelDate||!travelTime||!custName||!custPhone||!custEmail||!custRegNo||!fare){
    errEl.textContent = 'All fields are required.';
    return;
  }
  errEl.textContent='';

  // Generate code using registration number
  const code = genCode(custRegNo);
  
  const ticket = {
    code, origin, destination, travelDate, travelTime, operator,
    fare, custName, custPhone, custEmail, custRegNo,
    issuedAt: new Date().toISOString()
  };
  
  bookings.push(ticket);
  await saveBookings();
  currentTicket = ticket;
  renderTicket(ticket);
  renderHistory();
  
  showToast('🎫 Ticket generated! Code: ' + code, 'success');
  await sendAutoReplyEmail(ticket);
}

  const wrap = document.getElementById('ticketWrap');
  wrap.innerHTML = `
    <div class="ticket" id="ticketCard">
      <div class="ticket-top">
        <div class="tt-brand">TransitCore</div>
        <div class="tt-sub">Student Transit, Sorted · ${t.operator}</div>
      </div>
      <div class="ticket-route">
        <div class="route-line">
          <div class="route-city">${t.origin}<span class="sub">Origin</span></div>
          <div class="route-arrow">✈→</div>
          <div class="route-city" style="text-align:right;">${t.destination}<span class="sub">Destination</span></div>
        </div>
      </div>
      <div class="perforation"></div>
      <div class="ticket-grid">
        <div class="tg-item"><div class="tg-label">Passenger</div><div class="tg-value">${t.custName}</div></div>
        <div class="tg-item"><div class="tg-label">Reg No</div><div class="tg-value">${t.custRegNo}</div></div>
        <div class="tg-item"><div class="tg-label">Date</div><div class="tg-value">${formatDate(t.travelDate)}</div></div>
        <div class="tg-item"><div class="tg-label">Departure</div><div class="tg-value">${t.travelTime}</div></div>
        <div class="tg-item"><div class="tg-label">Fare paid</div><div class="tg-value">₦${Number(t.fare).toLocaleString()}</div></div>
        <div class="tg-item"><div class="tg-label">Phone</div><div class="tg-value">${t.custPhone}</div></div>
        <div class="tg-item"><div class="tg-label">Email</div><div class="tg-value">${t.custEmail}</div></div>
      </div>
      <div class="perforation"></div>
      <div class="ticket-code-block">
        <div class="code-text"><span class="label">Ticket code</span>${t.code}</div>
        <div class="qr-box"><img src="${qrUrl}" alt="QR"></div>
      </div>
      <div style="padding: 12px 24px 18px; border-top: 2px dashed #C9C2A6; background: #FFF8E1;">
        <div style="color: #B5482A; font-size: 11px; font-weight: 700; margin-bottom: 4px;">⚠️ IMPORTANT:</div>
        <div style="color: #132018; font-size: 11px; line-height: 1.5;">
          • Arrive 30 minutes before departure<br>
          • Show this ticket on your device OR print it out<br>
          • Valid ID card is <strong>MANDATORY</strong> for entry
        </div>
      </div>
    </div>
    <div class="ticket-actions">
      <button class="action-btn whatsapp" onclick="sendWhatsapp()">📱 WhatsApp</button>
      <button class="action-btn email" onclick="sendManualEmail()">✉️ Resend Email</button>
      <button class="action-btn download" onclick="downloadTicket()">⬇️ Download PNG</button>
    </div>
  `;
}

    + `📍 *Trip Details*\n`

    + `To: ${t.destination}\n`

    + `Operator: ${t.operator}\n\n`
    + `👤 *Passenger*\n`
    + `Name: ${t.custName}\n`
    + `Reg No: ${t.custRegNo}\n`
    + `Phone: ${t.custPhone}\n`
    + `Email: ${t.custEmail}\n\n`
    + `💰 *Fare Paid: ₦${Number(t.fare).toLocaleString()}*\n\n`
    + `🎫 *Ticket Code: ${t.code}*\n\n`
    + `⚠️ *IMPORTANT REQUIREMENTS:*\n`

async function sendWhatsapp(){
  if(!currentTicket) {
    showToast('No ticket to send!', 'error');
    return;
  }
  
  try {
    showToast('📱 Generating ticket image...', 'success');
    
    // Generate the ticket PNG
    const imageDataUrl = await generateTicketPNG(currentTicket);
    
    // Format phone number
    let phone = currentTicket.custPhone.replace(/[^0-9]/g,'');
    if(phone.startsWith('0')) phone = '234'+phone.slice(1);
    if(!phone.startsWith('234') && phone.length===10) phone = '234'+phone;
    
    // Create message with clear instructions
    const text = encodeURIComponent(
      `🎟️ *TRANSITCORE TICKET*\n\n` +
      `Hello ${currentTicket.custName},\n\n` +
      `Your ticket is ready!\n\n` +
      `🎫 *Ticket Code:* ${currentTicket.code}\n` +
      `📍 ${currentTicket.origin} → ${currentTicket.destination}\n` +
      `📅 ${formatDate(currentTicket.travelDate)} at ${currentTicket.travelTime}\n\n` +
      `⚠️ *IMPORTANT:*\n` +
      `• Arrive 30 minutes before departure\n` +
      `• Valid ID card is MANDATORY for entry\n` +
      `• Show this ticket on your device OR print it out\n\n` +
      `— TransitCore · Student Transit, Sorted`
    );
    
    // Open WhatsApp with the text
    window.open(`https://wa.me/${phone}?text=${text}`, '_blank');
    
    showToast('📱 WhatsApp opened! Send the ticket image manually.', 'success');
    
    // Also trigger download so they can attach it
    setTimeout(() => {
      showToast('💡 Download the PNG and attach it to WhatsApp', 'success');
    }, 2000);
    
  } catch(error) {
    console.error('WhatsApp error:', error);
    showToast('❌ Error opening WhatsApp', 'error');
  }
}

function sendManualEmail(){
  if(!currentTicket) {
    showToast('No ticket to send!', 'error');
    return;
  }
  sendAutoReplyEmail(currentTicket);
}

function downloadTicket(){
  if(!currentTicket) {
    showToast('No ticket to download!', 'error');
    return;
  }
  
  showToast('⬇️ Generating PNG...', 'success');
  
  generateTicketPNG(currentTicket).then(dataUrl => {
    const link = document.createElement('a');
    link.download = `${currentTicket.code}.png`;
    link.href = dataUrl;
    link.click();
    showToast('✅ Ticket downloaded!', 'success');
  }).catch(err => {
    showToast('❌ Error downloading ticket', 'error');
  });
}

function renderHistory(){
  const list = document.getElementById('historyList');
  const q = (document.getElementById('historySearch').value || '').toLowerCase();
  const filtered = bookings.slice().reverse().filter(b=>
    b.custName.toLowerCase().includes(q) || 
    b.code.toLowerCase().includes(q) ||
    (b.custRegNo && b.custRegNo.toLowerCase().includes(q))
  ).slice(0,40);
  if(filtered.length===0){
    list.innerHTML = '<div class="history-empty">No tickets yet — generate one to see it here.</div>';
    return;
  }
  list.innerHTML = filtered.map(b=>`
    <div class="history-row" onclick='reopenTicket("${b.code}")'>
      <div>
        <div class="hr-name">${b.custName}</div>
        <div class="hr-route">${b.origin} → ${b.destination} · ${b.custRegNo || ''}</div>
      </div>
      <div class="hr-code">${b.code}</div>
    </div>
  `).join('');
}

function reopenTicket(code){
  const t = bookings.find(b=>b.code===code);
  if(!t) return;
  currentTicket = t;
  renderTicket(t);
  showToast('🔄 Loaded ticket: ' + t.code, 'success');
}
